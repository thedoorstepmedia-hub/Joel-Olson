<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joel Olson Mortgage Team | AI Assistant Demo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: #0f1f2e;
    background: linear-gradient(160deg, #0f1f2e 0%, #16314a 100%);
    min-height: 100vh;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .wrap { max-width: 560px; text-align: center; }
  .wrap h1 { font-size: 28px; font-weight: 700; margin-bottom: 10px; }
  .wrap p { color: #b9c8d6; font-size: 15px; line-height: 1.5; margin-bottom: 6px; }
  .badge {
    display: inline-block; margin-top: 18px; padding: 6px 14px;
    border: 1px solid #2e4a63; border-radius: 20px; font-size: 12px;
    color: #8fb3cf; letter-spacing: .05em;
  }

  /* ---- Chat bubble ---- */
  #chatBubble {
    position: fixed; bottom: 24px; right: 24px;
    width: 62px; height: 62px; border-radius: 50%;
    background: #c9a24b;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: 0 6px 20px rgba(0,0,0,.35);
    z-index: 9999; animation: pulse 2.4s infinite;
  }
  #chatBubble svg { width: 28px; height: 28px; fill: #0f1f2e; }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(201,162,75,.55); }
    70% { box-shadow: 0 0 0 14px rgba(201,162,75,0); }
    100% { box-shadow: 0 0 0 0 rgba(201,162,75,0); }
  }

  #chatWindow {
    position: fixed; bottom: 100px; right: 24px;
    width: 360px; max-width: calc(100vw - 32px);
    height: 540px; max-height: calc(100vh - 140px);
    background: #fff; border-radius: 16px; overflow: hidden;
    display: none; flex-direction: column;
    box-shadow: 0 12px 40px rgba(0,0,0,.4);
    z-index: 9999;
  }
  #chatWindow.open { display: flex; }

  #chatHeader {
    background: #16314a; color: #fff; padding: 16px 18px;
    display: flex; align-items: center; gap: 12px;
  }
  #chatHeader .avatar {
    width: 38px; height: 38px; border-radius: 50%; background: #c9a24b;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; color: #0f1f2e; font-size: 15px; flex-shrink: 0;
  }
  #chatHeader .info { flex: 1; }
  #chatHeader .info .name { font-weight: 700; font-size: 14.5px; }
  #chatHeader .info .status { font-size: 11.5px; color: #aebfd0; display: flex; align-items: center; gap: 5px; margin-top: 2px; }
  #chatHeader .status .dot { width: 7px; height: 7px; border-radius: 50%; background: #3ecf8e; display: inline-block; }
  #chatHeader .close { cursor: pointer; font-size: 20px; color: #cdd9e4; padding: 4px; line-height: 1; }

  #messages { flex: 1; overflow-y: auto; padding: 16px; background: #f6f8fa; }
  .msg { margin-bottom: 12px; display: flex; }
  .msg.user { justify-content: flex-end; }
  .msg .bubble {
    max-width: 80%; padding: 10px 14px; border-radius: 14px; font-size: 13.5px; line-height: 1.45;
  }
  .msg.bot .bubble { background: #fff; color: #1c2b38; border: 1px solid #e4e9ed; border-bottom-left-radius: 4px; }
  .msg.user .bubble { background: #16314a; color: #fff; border-bottom-right-radius: 4px; }
  .msg .bubble strong { font-weight: 700; }

  .quickReplies { display: flex; flex-wrap: wrap; gap: 6px; margin: 4px 0 12px; }
  .qr-btn {
    background: #fff; border: 1px solid #c9a24b; color: #946a13;
    border-radius: 14px; padding: 6px 12px; font-size: 12px; cursor: pointer;
  }
  .qr-btn:hover { background: #fdf6e8; }

  .typing { display: flex; gap: 4px; padding: 10px 14px; background: #fff; border-radius: 14px; border: 1px solid #e4e9ed; width: fit-content; }
  .typing span { width: 6px; height: 6px; border-radius: 50%; background: #a9b6c1; animation: blink 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,80%,100% { opacity: .3; } 40% { opacity: 1; } }

  #inputBar { display: flex; padding: 10px; border-top: 1px solid #e4e9ed; background: #fff; }
  #inputBar input {
    flex: 1; border: 1px solid #d7dee4; border-radius: 20px; padding: 10px 14px;
    font-size: 13.5px; outline: none;
  }
  #inputBar input:focus { border-color: #c9a24b; }
  #inputBar button {
    margin-left: 8px; background: #16314a; color: #fff; border: none;
    width: 38px; height: 38px; border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  #inputBar button svg { width: 16px; height: 16px; fill: #fff; }

  .leadBadge {
    background: #eaf7ef; border: 1px solid #b9e6c9; color: #1f7a45;
    border-radius: 10px; padding: 8px 12px; font-size: 12px; margin-bottom: 12px;
  }
</style>
</head>
<body>

<div class="wrap">
  <h1>Joel Olson Mortgage Team</h1>
  <p>AI assistant demo. Built by Nexteps</p>
  <p>Click the gold bubble bottom-right and try it. Ask about renewals, self-employed mortgages, credit challenges, or rural financing.</p>
  <div class="badge">LIVE DEMO · NOT YET CONNECTED TO PRODUCTION INBOX</div>
</div>

<div id="chatBubble" onclick="toggleChat()">
  <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
</div>

<div id="chatWindow">
  <div id="chatHeader">
    <div class="avatar">S</div>
    <div class="info">
      <div class="name">Scout · Joel Olson Mortgage Team</div>
      <div class="status"><span class="dot"></span> Online now</div>
    </div>
    <div class="close" onclick="toggleChat()">&times;</div>
  </div>
  <div id="messages"></div>
  <div id="inputBar">
    <input id="userInput" type="text" placeholder="Type a message..." onkeydown="if(event.key==='Enter') handleSend()">
    <button onclick="handleSend()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
/* ============================================================
   NEXTEPS CHATBOT. Joel Olson Mortgage Team
   Vertical: Mortgage broker (regulated, prep-pivot rules apply)
   ============================================================ */

const PROXY_URL   = 'https://doorstep-proxy-production.up.railway.app';
const PROXY_SECRET = 'nexteps-proxy-2025';
const CLIENT_TOKEN  = 'joel-olson-demo-token-jom817';
const WEBSITE_URL   = 'https://www.joelolson.ca/';

// NOTE: leadEmail is set to Sujith's own inbox for this demo phase so test
// leads land with Sujith, not Joel, until Joel actually signs on. Swap this
// to joel@joelolson.ca the moment this goes from "demo" to "production".
const LEAD_EMAIL = 'sujith@nexteps.ca';
const DEMO_MODE  = true; // true = show "Lead captured" badge only, no real email yet
const APPLY_LINK = 'https://joel-olson-mortgage-team.mtg-app.com/signup';

function looksLikeApplyIntent(text) {
  return /\bapply\b|get started|sign ?up|start (my|the) application/i.test(text.trim());
}

function detectReferralSource(text) {
  const t = text.toLowerCase();
  const events = ['kelowna', 'kamloops', 'revelstoke', 'fernie', 'prince george', 'victoria', 'kootenays'];
  if (/referred|recommend(ed)?|told me about|sent me/i.test(t)) return 'Referral mentioned: "' + text.trim() + '"';
  if (/met (joel|him) (at|in)|heard (joel|him) speak|saw (joel|him) at/i.test(t)) return 'Met Joel in person: "' + text.trim() + '"';
  for (const city of events) {
    if (t.includes(city)) return 'Mentioned event/city: ' + city;
  }
  return null;
}

const BASE_SYSTEM_PROMPT = `You are Scout, the warm and knowledgeable AI assistant for Joel Olson Mortgage Team,
a mortgage brokerage based in Kamloops, BC, serving clients across BC and Alberta.

BROKER: Joel Olson, mortgage broker since 2008 (17+ years experience), part of Indi Mortgage
(The Independent Mortgage Company). 40+ five-star Google reviews. Licensed across BC & Alberta.

SPECIALTY: Joel specializes in the files other brokers turn away: rural and acreage financing,
self-employed borrowers, credit challenges, alternative/private lending, and complex files.
He works with lenders most brokers don't access, including banks, credit unions, mortgage
companies, and private lenders.

CONTACT: joel@joelolson.ca | 250-814-1627
Office in Kamloops, serving clients throughout BC and Alberta (Kamloops, Kelowna, Vernon,
Penticton, Revelstoke, Golden, Fernie, Prince George, Victoria, Kootenays, Northern BC,
Calgary, Edmonton, Red Deer, Whitehorse).

SERVICES: Home purchase, refinance, mortgage renewal, first-time home buyers, self-employed
mortgages, next home / moving up, investment properties, reverse mortgages for older Canadians,
divorce mortgages, private lending, credit-challenge mortgages, new to Canada, construction
financing, debt consolidation.

HOW IT WORKS: 1) Connect with Joel directly. He listens and gives an honest read on where you
stand. 2) He compares lenders across the full market, including alternative and private lenders.
3) You proceed with confidence, with Joel available from application through renewal.

FEES: In most cases there is no cost to the client. The lender compensates Joel once the
mortgage closes. For private lending or complex financing, any fees are explained clearly
upfront.

TONE: Warm, direct, no-nonsense, confident. 2-4 sentences per reply. Bold sparingly.
Never make Joel sound like a bank. He is independent and shops the whole market.

RATES: Rates change daily. Never quote or estimate a specific rate, payment amount, or
qualification outcome. Always say a live quote requires Joel reviewing the actual file.

REGULATED ADVICE BOUNDARY, VERY IMPORTANT:
You must NEVER answer specific qualification questions ("will I qualify", "what rate will I get",
"how much can I borrow", credit score thresholds, income/debt thresholds, or whether a specific
situation will be approved). These require Joel reviewing the actual file.

When someone asks a specific qualification or advice question, do NOT attempt to answer it.
Many people who reach out have already been told no by a bank, that is exactly why Joel exists,
it is his specialty, not a problem. Lead with that reassurance briefly, then use this exact
pattern: one sentence acknowledging the topic, then a short prep list, then offer to connect:

"[Topic] is something Joel needs to look at personally. To make the most of that conversation,
have these handy:
- [relevant item]
- [relevant item]
- [relevant item]
Want me to get you connected with him?"

Use these prep lists by topic:
- Credit/qualification: credit score, outstanding debts, last 2 years T4s or NOAs, income details,
  down payment savings, target property value
- Self-employed: last 2 years NOAs, business financials, how long self-employed
- Refinancing: current mortgage balance, lender and rate, remaining term, property estimate,
  reason for refinancing
- Renewal: current lender, rate and term expiry, any income or property changes
- Investment property: rental income, existing properties owned, down payment available
- Rural/acreage: property type and size, zoning, well/septic details, intended use
- New to Canada: arrival date, work permit or PR status, employment status, down payment source

You CAN freely answer process questions: what a mortgage broker does and why it costs nothing
in most cases, fixed vs variable concepts, what pre-approval means, what documents are typically
needed, general timelines, the difference between bank and broker, what private lending is in
general terms, what renewal means and why shopping it matters.

Output [COLLECT_LEAD] on its own line whenever the visitor says anything like:
- "I want to talk to Joel" / "connect me with Joel" / "get me connected"
- "Can someone call me" / "can Joel call me" / "have him reach out"
- "I want to apply" / "I want to get started" / "how do I apply"
- "Can I book a call" / "can we set up a time" / "I'd like a consultation"
- "What rate can I get" / "will I qualify" / "how much can I borrow" (after the prep-pivot reply, still trigger this)
- Any clear request to be contacted, booked, or followed up with

When in doubt between answering and triggering lead capture, lean toward triggering it once
the visitor has asked a real qualification question or expressed any interest in moving
forward, since the human conversation with Joel is always more valuable than further bot replies.`;

function getSystemPrompt() {
  const today = new Date().toLocaleDateString('en-CA', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  return `Today is ${today}. ${BASE_SYSTEM_PROMPT}`;
}

let conversationHistory = [];
let leadStep = null;
let leadData = { name: null, phone: null, reason: null, urgency: null };
let chatOpened = false;
let referralSource = null;

function toggleChat() {
  const win = document.getElementById('chatWindow');
  win.classList.toggle('open');
  if (win.classList.contains('open') && !chatOpened) {
    chatOpened = true;
    addMsg('bot', "Hey, I'm Scout, Joel's AI assistant. I can walk you through how things work, what to expect, or get you connected with Joel directly. What's on your mind?");
    renderQuickReplies([
      "What does a broker actually do?",
      "I'm self-employed",
      "My mortgage is coming up for renewal",
      "I want to talk to Joel"
    ]);
  }
}

function addMsg(role, text) {
  const messages = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg ' + (role === 'user' ? 'user' : 'bot');
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = formatMarkdown(text);
  row.appendChild(bubble);
  messages.appendChild(row);
  messages.scrollTop = messages.scrollHeight;
}

function renderQuickReplies(options) {
  const messages = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'quickReplies';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'qr-btn';
    btn.textContent = opt;
    btn.onclick = () => { document.getElementById('userInput').value = opt; handleSend(); wrap.remove(); };
    wrap.appendChild(btn);
  });
  messages.appendChild(wrap);
  messages.scrollTop = messages.scrollHeight;
}

function showTyping() {
  const messages = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg bot';
  row.id = 'typingRow';
  row.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  messages.appendChild(row);
  messages.scrollTop = messages.scrollHeight;
}
function hideTyping() {
  const row = document.getElementById('typingRow');
  if (row) row.remove();
}

function formatMarkdown(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '$1')
    .replace(/\n/g, '<br>');
}

function isQuestion(text) {
  const t = text.trim().toLowerCase();
  return t.endsWith('?') || /^(what|how|when|where|why|who|can|do|is|are|will|should|could|would|does)\b/.test(t);
}

function extractName(raw) {
  let s = raw.trim();
  s = s.replace(/^(my name is|i'm|i am|it's|its|call me)\s+/i, '');
  s = s.split(/[,\.]/)[0].trim();
  const words = s.split(/\s+/).slice(0, 3);
  const name = words.map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
  if (/[\d\$\?@]/.test(name) || s.length > 30 || words.length > 3) return null;
  return name;
}

function hasPhone(text) {
  return (text.replace(/\D/g, '').length >= 7);
}

function looksLikeLeadIntent(text) {
  const t = text.trim().toLowerCase();
  const patterns = [
    /connect me/, /talk to joel/, /call me/, /call him/, /reach out/,
    /book a call/, /set up a (time|call)/, /consultation/,
    /i want to apply/, /how do i apply/, /get started/,
    /can he call/, /have joel/
  ];
  return patterns.some(p => p.test(t));
}

async function handleSend() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMsg('user', text);

  if (leadStep) {
    await handleLeadInput(text);
    return;
  }

  if (conversationHistory.length === 0 && !referralSource) {
    referralSource = detectReferralSource(text);
  }

  conversationHistory.push({ role: 'user', content: text });
  showTyping();

  try {
    const res = await fetch(PROXY_URL + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        proxySecret: PROXY_SECRET,
        clientToken: CLIENT_TOKEN,
        messages: conversationHistory,
        systemPrompt: getSystemPrompt(),
        websiteUrl: WEBSITE_URL
      })
    });
    const data = await res.json();
    hideTyping();
    let reply = data.reply || "Sorry, I didn't quite catch that, mind rephrasing?";

    const aiTriggered = reply.includes('[COLLECT_LEAD]');
    const fallbackTriggered = !aiTriggered && looksLikeLeadIntent(text);

    if (aiTriggered || fallbackTriggered) {
      reply = reply.replace(/\[COLLECT_LEAD\]/g, '').trim();
      if (looksLikeApplyIntent(text)) {
        reply = (reply ? reply + ' ' : '') + `If you'd rather get started right away, you can also apply directly here: ${APPLY_LINK}`;
      }
      if (reply) addMsg('bot', reply);
      leadStep = 'name';
      const namePrompt = "I'd love to get you connected with Joel! To start, what's your name?";
      addMsg('bot', namePrompt);
      conversationHistory.push({ role: 'assistant', content: (reply ? reply + ' ' : '') + namePrompt });
      return;
    }

    addMsg('bot', reply);
    conversationHistory.push({ role: 'assistant', content: reply });

  } catch (err) {
    hideTyping();
    addMsg('bot', "I'm having trouble connecting right now, you can always reach Joel directly at 250-814-1627 or joel@joelolson.ca.");
  }
}

async function handleLeadInput(text) {
  if ((leadStep === 'name' || leadStep === 'phone' || leadStep === 'urgency') && isQuestion(text)) {
    conversationHistory.push({ role: 'user', content: text });
    showTyping();
    try {
      const res = await fetch(PROXY_URL + '/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          proxySecret: PROXY_SECRET,
          clientToken: CLIENT_TOKEN,
          messages: conversationHistory,
          systemPrompt: getSystemPrompt(),
          websiteUrl: WEBSITE_URL
        })
      });
      const data = await res.json();
      hideTyping();
      const answer = (data.reply || '').replace(/\[COLLECT_LEAD\]/g, '').trim();
      addMsg('bot', answer);
      conversationHistory.push({ role: 'assistant', content: answer });

      let aiAlreadyAsked;
      if (leadStep === 'name') aiAlreadyAsked = /name|call you|who am i/i.test(answer);
      else if (leadStep === 'phone') aiAlreadyAsked = /number|phone|reach you|call you/i.test(answer);
      else aiAlreadyAsked = /soon|explor|timeline|ready|move on/i.test(answer);

      if (!aiAlreadyAsked) {
        let reaskMsg;
        if (leadStep === 'name') reaskMsg = "Anyway, what's your name?";
        else if (leadStep === 'phone') reaskMsg = "And what's the best phone number to reach you?";
        else reaskMsg = "Just so I flag this right for Joel, are you looking to move on this soon, or just exploring for now?";
        addMsg('bot', reaskMsg);
        conversationHistory.push({ role: 'assistant', content: reaskMsg });
      }
    } catch (err) {
      hideTyping();
    }
    return;
  }

  if (leadStep === 'name') {
    const name = extractName(text);
    if (!name) {
      const reask = "Sorry, just want to grab your first name. What should I call you?";
      addMsg('bot', reask);
      conversationHistory.push({ role: 'user', content: text });
      conversationHistory.push({ role: 'assistant', content: reask });
      return;
    }
    leadData.name = name;
    conversationHistory.push({ role: 'user', content: text });
    const phonePrompt = `Great to meet you, ${name}! What's the best phone number to reach you at?`;
    addMsg('bot', phonePrompt);
    conversationHistory.push({ role: 'assistant', content: phonePrompt });
    leadStep = 'phone';
    return;
  }

  if (leadStep === 'phone') {
    if (!hasPhone(text)) {
      const reask = "That doesn't look like a full phone number, mind double-checking it?";
      addMsg('bot', reask);
      conversationHistory.push({ role: 'user', content: text });
      conversationHistory.push({ role: 'assistant', content: reask });
      return;
    }
    leadData.phone = text.trim();
    conversationHistory.push({ role: 'user', content: text });
    const reasonPrompt = "Perfect. And what's this about: purchase, refinance, renewal, self-employed, or something else?";
    addMsg('bot', reasonPrompt);
    conversationHistory.push({ role: 'assistant', content: reasonPrompt });
    leadStep = 'reason';
    return;
  }

  if (leadStep === 'reason') {
    leadData.reason = text.trim();
    conversationHistory.push({ role: 'user', content: text });

    const urgencyPrompt = "Got it. Are you looking to move on this soon, or just exploring for now?";
    addMsg('bot', urgencyPrompt);
    conversationHistory.push({ role: 'assistant', content: urgencyPrompt });
    leadStep = 'urgency';
    return;
  }

  if (leadStep === 'urgency') {
    leadData.urgency = text.trim();
    conversationHistory.push({ role: 'user', content: text });

    const confirmMsg = `Thanks, ${leadData.name}! Joel personally reviews every conversation and typically calls back the same business day. In the meantime, you can also reach him directly at 250-814-1627.`;
    addMsg('bot', confirmMsg);
    conversationHistory.push({ role: 'assistant', content: confirmMsg });

    await submitLead();
    leadStep = null;
    return;
  }
}

async function submitLead() {
  const fullReason = leadData.reason
    + (leadData.urgency ? ' | Urgency: ' + leadData.urgency : '')
    + (referralSource ? ' | ' + referralSource : '');

  if (DEMO_MODE) {
    const messages = document.getElementById('messages');
    const badge = document.createElement('div');
    badge.className = 'leadBadge';
    badge.innerHTML = `📋 Lead captured (demo): ${leadData.name} · ${leadData.phone} · ${fullReason}`;
    messages.appendChild(badge);
    messages.scrollTop = messages.scrollHeight;
    return;
  }
  try {
    await fetch(PROXY_URL + '/lead', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        proxySecret: PROXY_SECRET,
        clientToken: CLIENT_TOKEN,
        name: leadData.name,
        phone: leadData.phone,
        reason: fullReason,
        clinicEmail: LEAD_EMAIL
      })
    });
  } catch (err) {
    console.error('Lead submit failed', err);
  }
}
</script>

</body>
</html>
